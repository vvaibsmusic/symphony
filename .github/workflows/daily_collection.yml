name: Daily Data Collection

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger YouTube Discover
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL || 'https://vvaibsmusic-symphony.hf.space' }}
        run: |
          echo "Triggering YouTube Discover..."
          curl -X POST -sSf "${HF_SPACE_URL}/api/refresh/discover"

      - name: Trigger YouTube Stats
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL || 'https://vvaibsmusic-symphony.hf.space' }}
        run: |
          echo "Triggering YouTube Stats..."
          curl -X POST -sSf "${HF_SPACE_URL}/api/refresh/stats"

      - name: Trigger Spotify Stats
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL || 'https://vvaibsmusic-symphony.hf.space' }}
        run: |
          echo "Triggering Spotify Stats..."
          curl -X POST -sSf "${HF_SPACE_URL}/api/refresh/spotify/stats"
