name: Daily Data Collection

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Run collector
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python collector/collector.py

      - name: Keep HF Space alive
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          echo "Pinging HF Space to keep it alive..."
          curl -sSf "${HF_SPACE_URL}/api/scheduler/status" || echo "HF Space ping failed (non-fatal)"
