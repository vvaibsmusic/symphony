name: Keep HF Space Alive

on:
  schedule:
    # Runs every 25 minutes, 24/7 — prevents the 48h idle sleep
    - cron: '*/25 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Symphony Space
        run: |
          echo "Pinging at $(date -u)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://vvaibsmusic-symphony.hf.space/api/stats")
          echo "Response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Space is alive"
          else
            echo "⚠️ Space returned $STATUS — may be waking up (non-fatal)"
          fi
